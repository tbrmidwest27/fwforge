<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fwforge</title>
<style>
:root {
  --bg:#f6f7f9; --card:#fff; --ink:#1c2430; --mut:#65718a;
  --line:#dde2ea; --acc:#0a5fb4; --accink:#fff;
  --err:#b42318; --errbg:#fef2f1; --warn:#9a6700; --warnbg:#fff8e6;
  --ok:#13744b; --okbg:#eefaf3; --info:#475467; --infobg:#f1f3f7;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink);
  font:15px/1.5 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
header { background:#14233c; color:#fff; padding:.7rem 1.2rem;
  display:flex; align-items:baseline; gap:.8rem; }
header a { color:#fff; text-decoration:none; font-weight:700;
  font-size:1.15rem; letter-spacing:.02em; }
header .ver { color:#9fb4d8; font-size:.8rem; }
header .tag { color:#7e93b8; font-size:.8rem; margin-left:auto; }
main { max-width:1150px; margin:1.2rem auto 4rem; padding:0 1rem; }
h1 { font-size:1.25rem; margin:.2rem 0 .8rem; }
h2 { font-size:1.02rem; margin:1.4rem 0 .5rem; }
.card { background:var(--card); border:1px solid var(--line);
  border-radius:10px; padding:1rem 1.2rem; margin-bottom:1rem; }
.row { display:flex; gap:1rem; flex-wrap:wrap; }
.row > .card { flex:1 1 320px; }
table { border-collapse:collapse; width:100%; font-size:.92rem; }
th, td { text-align:left; padding:.35rem .55rem;
  border-bottom:1px solid var(--line); vertical-align:middle; }
th { color:var(--mut); font-weight:600; font-size:.8rem;
  text-transform:uppercase; letter-spacing:.04em; }
input[type=text], select, textarea { font:inherit; padding:.35rem .5rem;
  border:1px solid var(--line); border-radius:6px; background:#fff;
  min-width:0; }
input[type=text]:focus, select:focus { outline:2px solid #bcd6f2; }
button, .btn { font:inherit; font-weight:600; background:var(--acc);
  color:var(--accink); border:0; border-radius:7px; padding:.5rem 1rem;
  cursor:pointer; text-decoration:none; display:inline-block; }
button.ghost, .btn.ghost { background:#fff; color:var(--acc);
  border:1px solid var(--acc); }
button.small { padding:.2rem .6rem; font-size:.8rem; }
.badge { display:inline-block; border-radius:99px; padding:.05rem .55rem;
  font-size:.74rem; font-weight:700; }
.b-vendor { background:#e4edf8; color:#0a4f96; }
.b-vdom { background:#efe9fb; color:#5b3da6; }
.b-err { background:var(--errbg); color:var(--err); }
.b-warn { background:var(--warnbg); color:var(--warn); }
.b-ok { background:var(--okbg); color:var(--ok); }
.b-info { background:var(--infobg); color:var(--info); }
.banner { border-radius:8px; padding:.6rem .9rem; margin:.6rem 0;
  font-size:.92rem; }
.banner.err { background:var(--errbg); color:var(--err);
  border:1px solid #f3c2bd; }
.kpis { display:flex; gap:.8rem; flex-wrap:wrap; margin:.4rem 0 .8rem; }
.kpi { background:var(--card); border:1px solid var(--line);
  border-radius:10px; padding:.55rem 1rem; min-width:120px; }
.kpi .n { font-size:1.4rem; font-weight:800; }
.kpi .l { color:var(--mut); font-size:.78rem; text-transform:uppercase;
  letter-spacing:.04em; }
.kpi.err .n { color:var(--err); } .kpi.warn .n { color:var(--warn); }
.kpi.ok .n { color:var(--ok); }
ul.findings { list-style:none; margin:.3rem 0; padding:0; }
ul.findings li { padding:.45rem .6rem; border-radius:7px;
  margin-bottom:.35rem; font-size:.92rem; }
ul.findings li.err { background:var(--errbg); }
ul.findings li.warn { background:var(--warnbg); }
ul.findings li.info { background:var(--infobg); }
ul.findings .area { font-weight:700; margin-right:.4rem; }
ul.findings .loc { color:var(--mut); font-size:.8rem; margin-left:.4rem; }
pre { background:#101725; color:#dce6f5; border-radius:8px;
  padding:.8rem 1rem; overflow:auto; font-size:.82rem; line-height:1.45; }
pre.light { background:#f1f3f7; color:#23304a; }
.diff div { white-space:pre; font-family:ui-monospace,Consolas,monospace; }
.diff .d-add { background:#10331f; color:#7ee2a8; }
.diff .d-del { background:#3a1715; color:#f0a9a2; }
.diff .d-hunk { color:#8fa3c4; }
.diff .d-ctx { color:#aab8d0; }
.muted { color:var(--mut); font-size:.85rem; }
details summary { cursor:pointer; font-weight:600; margin:.4rem 0; }
.dl { display:flex; gap:.6rem; flex-wrap:wrap; margin:.6rem 0; }
.grid-note { font-size:.82rem; color:var(--mut); margin:.2rem 0 .6rem; }
.builder-row { display:flex; gap:.5rem; align-items:flex-start;
  margin-bottom:.5rem; flex-wrap:wrap; }
.builder-row select[multiple] { min-height:5.4rem; min-width:170px; }
fieldset { border:1px solid var(--line); border-radius:8px;
  margin:0 0 1rem; padding: .6rem .9rem .9rem; }
legend { font-weight:700; font-size:.92rem; padding:0 .35rem; }
</style>
</head>
<body>
<header>
  <a href="{{ url_for('index') }}">fwforge</a>
  <span class="ver">v{{ version }}</span>
  <span class="tag">open firewall config converter &middot; runs entirely on this machine</span>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
