system {
    host-name srx-lab;
}
groups {
    base-if {
        interfaces {
            <ge-*> {
                mtu 1500;
            }
        }
    }
}
apply-groups base-if;
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 203.0.113.2/29;
            }
        }
    }
    ge-0/0/1 {
        vlan-tagging;
        unit 0 {
            family inet {
                address 10.1.0.1/24;
            }
        }
        unit 30 {
            vlan-id 30;
            family inet {
                address 192.168.30.1/24;
            }
        }
    }
    st0 {
        unit 0 {
            family inet;
        }
    }
}
routing-options {
    static {
        route 0.0.0.0/0 next-hop 203.0.113.1;
        route 10.9.0.0/16 next-hop 10.1.0.254;
    }
    router-id 10.1.0.1;
    autonomous-system 65001;
}
protocols {
    bgp {
        group upstream {
            type external;
            peer-as 65000;
            export send-statics;
            neighbor 203.0.113.1;
        }
        group dc {
            type internal;
            neighbor 10.1.0.7 {
                description "dc core";
                peer-as 65001;
            }
        }
    }
    ospf {
        export ospf-redist;
        area 0.0.0.0 {
            interface ge-0/0/1.0;
            interface ge-0/0/1.30 {
                passive;
            }
        }
    }
    lldp {
        interface all;
    }
}
applications {
    application custom-8443 {
        protocol tcp;
        destination-port 8443;
    }
    application-set web-apps {
        application junos-http;
        application junos-https;
        application custom-8443;
    }
}
security {
    address-book {
        global {
            address corp-net 10.0.0.0/8;
        }
    }
    zones {
        security-zone trust {
            interfaces {
                ge-0/0/1.0;
                ge-0/0/1.30;
            }
            address-book {
                address lan-net 10.1.0.0/24;
                address web-srv 10.1.0.10/32;
                address-set servers {
                    address web-srv;
                }
            }
        }
        security-zone untrust {
            interfaces {
                ge-0/0/0.0;
            }
        }
    }
    policies {
        from-zone trust to-zone untrust {
            policy allow-web {
                match {
                    source-address lan-net;
                    destination-address any;
                    application web-apps;
                }
                then {
                    permit;
                    log {
                        session-close;
                    }
                }
            }
            policy allow-ssh {
                match {
                    source-address servers;
                    destination-address corp-net;
                    application junos-ssh;
                }
                then {
                    permit;
                }
            }
        }
        from-zone untrust to-zone trust {
            policy inbound-web {
                match {
                    source-address any;
                    destination-address web-srv;
                    application junos-https;
                }
                then {
                    permit;
                }
            }
            policy block-rest {
                match {
                    source-address any;
                    destination-address any;
                    application any;
                }
                then {
                    deny;
                }
            }
        }
        global {
            policy global-deny {
                match {
                    source-address any;
                    destination-address any;
                    application any;
                }
                then {
                    deny;
                }
            }
        }
    }
    nat {
        source {
            rule-set trust-to-untrust {
                from zone trust;
                to zone untrust;
                rule snat-all {
                    match {
                        source-address 10.1.0.0/24;
                    }
                    then {
                        source-nat {
                            interface;
                        }
                    }
                }
            }
        }
        destination {
            pool web-pool {
                address 10.1.0.10/32 port 8443;
            }
            rule-set dnat {
                from zone untrust;
                rule dnat-web {
                    match {
                        destination-address 203.0.113.5/32;
                        destination-port 443;
                    }
                    then {
                        destination-nat {
                            pool web-pool;
                        }
                    }
                }
            }
        }
        static {
            rule-set static-nat {
                from zone untrust;
                rule static-mail {
                    match {
                        destination-address 203.0.113.6/32;
                    }
                    then {
                        static-nat {
                            prefix 10.1.0.20/32;
                        }
                    }
                }
            }
        }
    }
    ike {
        proposal ike-prop {
            authentication-method pre-shared-keys;
            dh-group group14;
            authentication-algorithm sha-256;
            encryption-algorithm aes-256-cbc;
            lifetime-seconds 28800;
        }
        policy ike-pol {
            mode main;
            proposals ike-prop;
            pre-shared-key ascii-text mysecretkey;
        }
        gateway gw-branch {
            ike-policy ike-pol;
            address 198.51.100.9;
            external-interface ge-0/0/0.0;
            version v2-only;
        }
    }
    ipsec {
        proposal ipsec-prop {
            protocol esp;
            authentication-algorithm hmac-sha-256-128;
            encryption-algorithm aes-256-cbc;
            lifetime-seconds 3600;
        }
        policy ipsec-pol {
            perfect-forward-secrecy {
                keys group14;
            }
            proposals ipsec-prop;
        }
        vpn branch-vpn {
            bind-interface st0.0;
            ike {
                gateway gw-branch;
                ipsec-policy ipsec-pol;
            }
            traffic-selector ts1 {
                local-ip 10.1.0.0/24;
                remote-ip 10.2.0.0/24;
            }
        }
    }
}
