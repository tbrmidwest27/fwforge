#config-version=FGT90G-7.4.4-FW-build2662-240514:opmode=0:vdom=0:user=admin
config system global
    set hostname "branch-90g"
end
config system physical-switch
    edit "sw0"
        set age-val 300
    next
end
config system virtual-switch
    edit "internal"
        set physical-switch "sw0"
        config port
            edit "port1"
            next
            edit "port2"
            next
            edit "port3"
            next
        end
    next
end
config system interface
    edit "internal"
        set vdom "root"
        set type hard-switch
        set member "port1" "port2" "port3"
        set ip 10.0.0.1 255.255.255.0
        set allowaccess ping https ssh
        set device-identification enable
    next
    edit "wan1"
        set vdom "root"
        set ip 198.51.100.2 255.255.255.248
        set allowaccess ping
    next
    edit "vlan10"
        set vdom "root"
        set interface "internal"
        set vlanid 10
        set ip 10.0.10.1 255.255.255.0
    next
end
config firewall policy
    edit 1
        set name "lan-out"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end
