#config-version=FGT121G-7.4.4-FW-build2662-240514:opmode=0:vdom=0:user=admin
#conf_file_ver=12345
#buildno=2662
config system global
    set admintimeout 30
    set hostname "lab-fgt"
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 203.0.113.2 255.255.255.248
        set allowaccess ping https ssh
        set alias "wan-uplink"
        set role wan
    next
    edit "port2"
        set vdom "root"
        set ip 10.1.0.1 255.255.0.0
        set allowaccess ping
        set role lan
    next
    edit "vlan30"
        set vdom "root"
        set ip 192.168.30.1 255.255.255.0
        set interface "port2"
        set vlanid 30
    next
end
config system zone
    edit "wan-zone"
        set interface "port1"
    next
end
config firewall address
    edit "lan-net"
        set subnet 10.1.0.0 255.255.0.0
    next
    edit "port1"
        set comment "address that shares a port name on purpose"
        set subnet 10.9.9.9 255.255.255.255
    next
end
config firewall addrgrp
    edit "mixed-grp"
        set member "lan-net" "port1"
    next
end
config firewall policy
    edit 1
        set name "out-allow"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "lan-net"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end
config router static
    edit 1
        set gateway 203.0.113.1
        set device "port1"
    next
end
config system dhcp server
    edit 1
        set interface "port2"
        config ip-range
            edit 1
                set start-ip 10.1.0.100
                set end-ip 10.1.0.199
            next
        end
        set default-gateway 10.1.0.1
        set netmask 255.255.0.0
    next
end
config system ntp
    set ntpsync enable
    set type fortiguard
end
config vpn certificate local
    edit "lab-cert"
        set comments "multi line value below"
        set certificate "-----BEGIN CERTIFICATE-----
MIIBfakefakefakefakefakefake
-----END CERTIFICATE-----"
    next
end
