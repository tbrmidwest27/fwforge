#config-version=FGT60F-7.4.4-FW-build2662-240514:opmode=0:vdom=0:user=admin
config system global
    set hostname "ras-60f"
end
config system interface
    edit "wan1"
        set ip 198.51.100.2 255.255.255.248
        set allowaccess ping https
    next
    edit "internal"
        set ip 10.10.0.1 255.255.0.0
        set allowaccess ping
    next
end
config firewall address
    edit "SSLVPN_POOL"
        set type iprange
        set start-ip 10.212.134.200
        set end-ip 10.212.134.250
    next
    edit "internal-subnets"
        set subnet 10.10.0.0 255.255.0.0
    next
end
config user group
    edit "sslvpn-users"
        set member "alice"
    next
end
config vpn ssl settings
    set status enable
    set servercert "Fortinet_Factory"
    set tunnel-ip-pools "SSLVPN_POOL"
    set port 10443
    set source-interface "wan1"
    set source-address "all"
    set default-portal "no-access"
    config authentication-rule
        edit 1
            set groups "sslvpn-users"
            set portal "full-access"
        next
    end
end
config vpn ssl web portal
    edit "full-access"
        set tunnel-mode enable
        set ip-pools "SSLVPN_POOL"
        set split-tunneling enable
        set split-tunneling-routing-address "internal-subnets"
    next
end
config firewall policy
    edit 1
        set name "sslvpn-to-internal"
        set srcintf "ssl.root"
        set dstintf "internal"
        set srcaddr "all"
        set dstaddr "internal-subnets"
        set action accept
        set schedule "always"
        set service "ALL"
        set groups "sslvpn-users"
    next
    edit 2
        set name "lan-out"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end
