#config-version=FGT601F-7.6.6-FW-build3510-250101:opmode=0:vdom=0:user=admin
config system global
    set hostname "refactor-src"
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 198.18.0.2 255.255.255.248
        set role wan
    next
    edit "port2"
        set vdom "root"
        set ip 10.10.0.1 255.255.0.0
        set role lan
    next
    edit "port3"
        set vdom "root"
        set ip 203.0.113.2 255.255.255.248
        set role wan
    next
    edit "port4"
        set vdom "root"
        set ip 198.51.100.2 255.255.255.248
        set role wan
    next
    edit "vlan30"
        set vdom "root"
        set ip 192.168.30.1 255.255.255.0
        set interface "port2"
        set vlanid 30
    next
end
config system zone
    edit "legacy-zone"
        set intrazone deny
        set interface "port1"
    next
end
config firewall address
    edit "lan-net"
        set subnet 10.10.0.0 255.255.0.0
    next
    edit "vlan-net"
        set subnet 192.168.30.0 255.255.255.0
    next
end
config firewall policy
    edit 1
        set name "lan-out-3"
        set srcintf "port2" "vlan30"
        set dstintf "port3"
        set srcaddr "lan-net" "vlan-net"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
    edit 2
        set name "lan-out-4"
        set srcintf "port2" "vlan30"
        set dstintf "port4"
        set srcaddr "lan-net" "vlan-net"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
    edit 3
        set name "lan-to-vlan"
        set srcintf "port2"
        set dstintf "vlan30"
        set srcaddr "lan-net"
        set dstaddr "vlan-net"
        set action accept
        set schedule "always"
        set service "ALL"
    next
    edit 4
        set name "legacy-out"
        set srcintf "legacy-zone"
        set dstintf "port3"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTPS"
    next
end
config router static
    edit 1
        set gateway 203.0.113.1
        set device "port3"
    next
    edit 2
        set gateway 198.51.100.1
        set device "port4"
    next
    edit 3
        set dst 10.50.0.0 255.255.0.0
        set gateway 203.0.113.6
        set device "port3"
    next
end
config system dhcp server
    edit 1
        set interface "port2"
        set default-gateway 10.10.0.1
        set netmask 255.255.0.0
    next
end
config router policy
    edit 1
        set input-device "port2"
        set output-device "port3"
        set srcaddr "lan-net"
        set dstaddr "all"
    next
end
config firewall vip
    edit "web-vip"
        set extip 203.0.113.4
        set mappedip "10.10.0.80"
        set extintf "port3"
    next
end
