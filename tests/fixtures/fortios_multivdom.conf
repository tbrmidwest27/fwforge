#config-version=FG121G-8.0.0-FW-build0167-260420:opmode=0:vdom=1:user=admin
config vdom
edit root
next
edit FGSP
next
end
config global
    config system global
        set hostname "mv-src"
        set vdom-mode multi-vdom
    end
    config system interface
        edit "port1"
            set vdom "root"
            set ip 198.18.0.2 255.255.255.248
            set role wan
        next
        edit "port2"
            set vdom "root"
            set ip 10.10.0.1 255.255.0.0
            set role lan
        next
        edit "port3"
            set vdom "FGSP"
            set ip 172.31.44.1 255.255.255.0
        next
        edit "port4"
            set vdom "FGSP"
            set ip 203.0.113.2 255.255.255.248
            set role wan
        next
        edit "vlan30"
            set vdom "root"
            set ip 192.168.30.1 255.255.255.0
            set interface "port2"
            set vlanid 30
        next
    end
end
config vdom
edit root
config system settings
    set comments "root vdom"
end
config firewall policy
    edit 1
        set name "out-a"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
    edit 2
        set name "out-b"
        set srcintf "vlan30"
        set dstintf "port1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end
config router static
    edit 1
        set gateway 198.18.0.1
        set device "port1"
    next
end
next
end
config vdom
edit FGSP
