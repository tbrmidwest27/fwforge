#config-version=FG6H1F-7.4.4-FW-build2662-240514:opmode=0:vdom=0:user=admin
config system global
    set hostname "legacy-74"
end
config system settings
    set gui-allow-unnamed-policy enable
end
config system npu
    set fastpath enable
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 198.18.7.2 255.255.255.248
    next
    edit "port2"
        set vdom "root"
        set ip 10.7.0.1 255.255.0.0
    next
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        config gui-dashboard
            edit 1
                set name "Status"
            next
        end
    next
end
config wireless-controller vap
    edit "office-wifi"
        set ssid "office"
        set intra-vap-privacy enable
    next
end
config vpn ssl settings
    set port 10443
    set source-interface "port1"
end
config vpn ssl web portal
    edit "full-access"
        set tunnel-mode enable
    next
end
config vpn ipsec phase1-interface
    edit "to-branch"
        set interface "port1"
        set peertype any
        set proposal aes256-sha256
        set remote-gw 203.0.113.99
        set psksecret ENC secret
    next
    edit "to-dc"
        set interface "port1"
        set peertype any
        set proposal aes256-sha256
        set dhgrp 14
        set remote-gw 203.0.113.77
        set psksecret ENC secret
    next
end
config vpn ipsec phase2-interface
    edit "to-branch-p2"
        set phase1name "to-branch"
        set proposal aes256-sha256
    next
end
config firewall address
    edit "printer-vlan"
        set subnet 10.7.30.0 255.255.255.0
        set hw-model "HP"
    next
end
config ips sensor
    edit "default-ips"
    next
end
config firewall policy
    edit 1
        set name "out"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set ips-sensor "default-ips"
        set nat enable
    next
end
config router static
    edit 1
        set gateway 198.18.7.1
        set device "port1"
    next
end
