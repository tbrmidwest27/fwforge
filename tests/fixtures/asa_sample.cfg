ASA Version 9.8(4)
!
hostname lab-asa
domain-name example.local
!
name 10.1.1.10 WEBSRV description Internal web server
!
interface GigabitEthernet0/0
 nameif outside
 security-level 0
 ip address 203.0.113.2 255.255.255.248
!
interface GigabitEthernet0/1
 nameif inside
 security-level 100
 ip address 10.1.0.1 255.255.0.0
!
interface GigabitEthernet0/1.30
 vlan 30
 nameif dmz
 security-level 50
 ip address 192.168.30.1 255.255.255.0
!
interface Management0/0
 management-only
 shutdown
 no nameif
!
object network LAN
 subnet 10.1.0.0 255.255.0.0
object network WEBSRV-INT
 host 10.1.1.10
 description web server inside
object network WEBSRV-PUB
 host 203.0.113.10
object network DMZ-POOL
 range 192.168.30.100 192.168.30.150
object network UPDATES-FQDN
 fqdn updates.example.com
object service TCP-8443
 service tcp destination eq 8443
object-group network ADMIN-HOSTS
 network-object host 10.1.1.50
 network-object 10.1.2.0 255.255.255.0
 network-object object WEBSRV-INT
object-group service WEB-PORTS tcp
 port-object eq www
 port-object eq 443
 port-object range 8000 8080
object-group service MGMT-SVCS
 service-object tcp destination eq 22
 service-object udp destination eq 161
 service-object icmp echo
 service-object object TCP-8443
object-group protocol TCPUDP
 protocol-object tcp
 protocol-object udp
access-list OUTSIDE-IN remark Public web server access
access-list OUTSIDE-IN extended permit tcp any object WEBSRV-INT object-group WEB-PORTS
access-list OUTSIDE-IN extended permit icmp any any echo-reply
access-list OUTSIDE-IN extended deny ip any any log
access-list INSIDE-OUT remark DNS to anywhere
access-list INSIDE-OUT extended permit object-group TCPUDP object LAN any eq domain
access-list INSIDE-OUT extended permit tcp object LAN any eq https
access-list INSIDE-OUT extended permit udp object LAN any gt 33433 log
access-list INSIDE-OUT extended permit tcp object-group ADMIN-HOSTS object WEBSRV-PUB object-group MGMT-SVCS inactive
access-list INSIDE-OUT extended permit ip object LAN object UPDATES-FQDN
access-list DMZ-IN extended permit tcp object DMZ-POOL object WEBSRV-INT eq www time-range BUSINESS
access-list UNUSED-ACL extended permit ip any any
access-group OUTSIDE-IN in interface outside
access-group INSIDE-OUT in interface inside
access-group DMZ-IN in interface dmz
route outside 0.0.0.0 0.0.0.0 203.0.113.1 1
route inside 10.9.0.0 255.255.0.0 10.1.0.254 1
object network LAN
 nat (inside,outside) dynamic interface
object network WEBSRV-INT
 nat (inside,outside) static 203.0.113.10 service tcp https https
nat (inside,outside) source static LAN LAN destination static REMOTE REMOTE
snmp-server host inside 10.1.1.99 community public
crypto ikev2 policy 10
 encryption aes-256
 integrity sha256
telnet timeout 5
ssh 10.1.0.0 255.255.0.0 inside
